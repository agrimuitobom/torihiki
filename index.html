<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お取引管理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input, select, textarea { font-size: 16px !important; } /* iOSズーム防止 */

        /* アニメーション */
        .modal-up {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#fffcfd] text-[#333] antialiased">
    <div id="root"></div>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm/dist/htm.umd.js"></script>

    <script>
        const { useState, useEffect, useCallback, useRef, useMemo, memo } = React;
        const html = htm.bind(React.createElement);

        // ────────────────────────────────────────────
        // SVGアイコンコンポーネント
        // ────────────────────────────────────────────
        const ICONS = {
            Plus:          { d: "M12 5v14M5 12h14",                                                                              fill: false },
            Twitter:       { d: "M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z", fill: false },
            Clipboard:     { d: "M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2M9 2h6v4H9z",       fill: false },
            Edit2:         { d: "M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z",                                      fill: false },
            Trash2:        { d: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6", fill: false },
            ArrowRightLeft:{ d: "M20 7H4M20 7l-4-4M20 7l-4 4M4 17h16M4 17l4 4M4 17l4-4",                                        fill: false },
            Heart:         { d: "M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z", fill: true },
            ChevronRight:  { d: "m9 18 6-6-6-6",                                                                                 fill: false },
        };

        const Icon = ({ name, size = 16, className = "", filled = false }) => {
            const icon = ICONS[name];
            if (!icon) return null;
            const useFill = icon.fill || filled;
            return html`
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width=${size}
                    height=${size}
                    viewBox="0 0 24 24"
                    fill=${useFill ? "currentColor" : "none"}
                    stroke=${useFill ? "none" : "currentColor"}
                    strokeWidth="2.5"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className=${className}
                >
                    <path d=${icon.d} />
                </svg>
            `;
        };

        // ────────────────────────────────────────────
        // トースト通知
        // ────────────────────────────────────────────
        const Toast = ({ message, visible }) => html`
            <div className=${`fixed bottom-24 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 pointer-events-none ${
                visible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-2"
            }`}>
                <div className="bg-black/80 text-white text-[11px] font-bold px-5 py-2.5 rounded-full shadow-xl whitespace-nowrap backdrop-blur-sm">
                    ${message}
                </div>
            </div>
        `;

        const useToast = () => {
            const [toast, setToast] = useState({ message: "", visible: false });
            const timerRef = useRef(null);

            const showToast = useCallback((message) => {
                if (timerRef.current) clearTimeout(timerRef.current);
                setToast({ message, visible: true });
                timerRef.current = setTimeout(() => {
                    setToast((prev) => ({ ...prev, visible: false }));
                }, 1800);
            }, []);

            return { toast, showToast };
        };

        // ────────────────────────────────────────────
        // 削除確認ダイアログ
        // ────────────────────────────────────────────
        const ConfirmDialog = ({ message, onConfirm, onCancel }) => html`
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-center justify-center px-6">
                <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl space-y-4">
                    <p className="text-xs font-bold text-center text-gray-600 leading-relaxed">${message}</p>
                    <div className="flex gap-3">
                        <button
                            onClick=${onCancel}
                            className="flex-1 py-3 rounded-2xl text-[11px] font-black bg-gray-100 text-gray-400 active:bg-gray-200 transition-colors"
                        >
                            キャンセル
                        </button>
                        <button
                            onClick=${onConfirm}
                            className="flex-1 py-3 rounded-2xl text-[11px] font-black bg-red-500 text-white active:bg-red-600 transition-colors"
                        >
                            削除する
                        </button>
                    </div>
                </div>
            </div>
        `;

        const useConfirm = () => {
            const [dialog, setDialog] = useState(null);

            const confirm = useCallback((message) => {
                return new Promise((resolve) => {
                    setDialog({ message, resolve });
                });
            }, []);

            const handleConfirm = () => { dialog.resolve(true);  setDialog(null); };
            const handleCancel  = () => { dialog.resolve(false); setDialog(null); };

            const ConfirmUI = dialog
                ? html`<${ConfirmDialog} message=${dialog.message} onConfirm=${handleConfirm} onCancel=${handleCancel} />`
                : null;

            return { confirm, ConfirmUI };
        };

        // ────────────────────────────────────────────
        // クリップボードユーティリティ（非推奨APIを排除）
        // ────────────────────────────────────────────
        const copyToClipboard = async (text) => {
            try {
                await navigator.clipboard.writeText(text);
            } catch {
                // フォールバック：古いAPIが必要な場合のみ使用
                const el = document.createElement("textarea");
                el.value = text;
                el.style.position = "fixed";
                el.style.opacity = "0";
                document.body.appendChild(el);
                el.focus();
                el.select();
                document.execCommand("copy");
                document.body.removeChild(el);
            }
        };

        // ────────────────────────────────────────────
        // 定数
        // ────────────────────────────────────────────
        const TABS = [
            { id: "ongoing",   label: "進行中" },
            { id: "dm",        label: "ＤＭ済" },
            { id: "waiting",   label: "待機"   },
            { id: "completed", label: "完了済" },
            { id: "templates", label: "定型文" },
        ];

        const STATUS_OPTIONS = ["未発送", "発送済み", "受取完了"];

        const EMPTY_EXCHANGE = {
            accountName: "", twitterId: "", realName: "",
            myStatus: "未発送", partnerStatus: "未発送",
            receivingItem: "", givingItem: "", notes: "", category: "ongoing",
        };

        const EMPTY_TEMPLATE = { title: "", content: "" };

        // ────────────────────────────────────────────
        // localStorage フック
        // ────────────────────────────────────────────
        const useLocalStorage = (key, initialValue) => {
            const [value, setValue] = useState(() => {
                try {
                    const stored = localStorage.getItem(key);
                    return stored ? JSON.parse(stored) : initialValue;
                } catch {
                    return initialValue;
                }
            });

            useEffect(() => {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch {
                    // ストレージ容量超過などの場合は無視
                }
            }, [key, value]);

            return [value, setValue];
        };

        // ────────────────────────────────────────────
        // サマリーセクション
        // ────────────────────────────────────────────
        const SummarySection = ({ stats }) => html`
            <section className="bg-white rounded-2xl p-4 flex justify-around items-center border border-gray-100 shadow-sm">
                ${[
                    { label: "進行",  val: stats.ongoing,   color: "#000"    },
                    { label: "ＤＭ済", val: stats.dm,        color: "#ff8da1" },
                    { label: "待ち",  val: stats.waiting,   color: "#ffb8c6" },
                    { label: "完了",  val: stats.completed, color: "#ccc"    },
                ].map((s) => html`
                    <div key=${s.label} className="text-center px-2">
                        <p className="text-xl font-black italic leading-none" style=${{ color: s.color }}>${s.val}</p>
                        <p className="text-[8px] font-bold text-gray-400 mt-1.5 uppercase tracking-wider">${s.label}</p>
                    </div>
                `)}
            </section>
        `;

        // ────────────────────────────────────────────
        // タブナビゲーション
        // ────────────────────────────────────────────
        const TabNav = ({ activeTab, onTabChange }) => html`
            <nav className="flex w-full bg-white border border-[#ffdce5] rounded-xl p-1 shadow-sm sticky top-[calc(3.5rem+env(safe-area-inset-top))] z-20">
                ${TABS.map((tab) => html`
                    <button
                        key=${tab.id}
                        onClick=${() => onTabChange(tab.id)}
                        className=${`flex-1 py-2 text-[10px] font-black transition-all rounded-lg ${
                            activeTab === tab.id ? "bg-black text-white" : "bg-white text-gray-400"
                        }`}
                    >
                        ${tab.label}
                    </button>
                `)}
            </nav>
        `;

        // ────────────────────────────────────────────
        // 取引カード
        // ────────────────────────────────────────────
        const ExchangeCard = memo(({ item, onEdit, onDelete, onCopy }) => html`
            <div className="bg-white rounded-[1.5rem] p-5 border border-gray-100 shadow-sm space-y-4">
                <div className="flex justify-between items-start">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center border border-[#ffdce5] shadow-inner">
                            <${Icon} name="Twitter" size=${18} />
                        </div>
                        <div>
                            <h3 className="font-black text-sm text-black leading-tight tracking-tight">${item.accountName}</h3>
                            <button
                                onClick=${() => onCopy(item.twitterId, "IDをコピーしました")}
                                className="text-[10px] font-bold text-[#ff8da1] flex items-center gap-1 mt-0.5"
                            >
                                @${item.twitterId} <${Icon} name="Clipboard" size=${10} />
                            </button>
                        </div>
                    </div>
                    <div className="bg-[#fff9fa] px-3 py-1 rounded-full border border-[#ffdce5]">
                        <span className="text-[8px] font-black text-black italic uppercase tracking-wider">
                            ${item.realName || "NO NAME"}
                        </span>
                    </div>
                </div>

                <div className="flex gap-2">
                    <div className=${`flex-1 flex flex-col items-center py-3 rounded-2xl border transition-colors ${
                        item.myStatus === "未発送" ? "bg-black text-white border-black" : "bg-[#ffdce5] text-[#ff4f81] border-[#ffdce5]"
                    }`}>
                        <span className="text-[7px] font-bold opacity-50 mb-0.5 tracking-tighter">MY STATUS</span>
                        <span className="text-[13px] font-black italic">${item.myStatus}</span>
                    </div>
                    <div className=${`flex-1 flex flex-col items-center py-3 rounded-2xl border transition-colors ${
                        item.partnerStatus === "未発送" ? "bg-white text-black border-[#ffdce5]" : "bg-[#ffdce5] text-[#ff4f81] border-[#ffdce5]"
                    }`}>
                        <span className="text-[7px] font-bold opacity-50 mb-0.5 tracking-tighter">PARTNER</span>
                        <span className="text-[13px] font-black italic">${item.partnerStatus}</span>
                    </div>
                </div>

                <div className="bg-[#fafafa] rounded-2xl p-4 flex items-center justify-between border border-gray-50 relative overflow-hidden">
                    <div className="text-center flex-1 relative z-10">
                        <p className="text-[7px] font-black text-[#ff8da1] uppercase mb-1 tracking-widest">GET</p>
                        <p className="font-black text-xs text-black italic">${item.receivingItem || "-"}</p>
                    </div>
                    <${Icon} name="ArrowRightLeft" size=${12} className="text-gray-200 mx-2" />
                    <div className="text-center flex-1 relative z-10">
                        <p className="text-[7px] font-black text-gray-400 uppercase mb-1 tracking-widest">GIVE</p>
                        <p className="font-black text-xs text-gray-400 italic">${item.givingItem || "-"}</p>
                    </div>
                </div>

                ${item.notes && html`
                    <div className="text-[9px] font-medium text-gray-400 italic pl-3 border-l-2 border-[#ffdce5] truncate">
                        Memo: ${item.notes}
                    </div>
                `}

                <div className="flex justify-end gap-3 pt-2 border-t border-gray-50">
                    <button
                        onClick=${() => onEdit(item)}
                        className="text-[10px] font-black text-black px-6 py-2 border-2 border-black rounded-xl active:bg-black active:text-white transition-all"
                    >
                        編集
                    </button>
                    <button onClick=${() => onDelete(item.id)} className="p-2 text-gray-200 active:text-red-400">
                        <${Icon} name="Trash2" size=${18} />
                    </button>
                </div>
            </div>
        `);

        // ────────────────────────────────────────────
        // 定型文カード
        // ────────────────────────────────────────────
        const TemplateCard = memo(({ item, onEdit, onDelete, onCopy }) => html`
            <div className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm space-y-3">
                <div className="flex justify-between items-center">
                    <h3 className="font-black text-xs flex items-center gap-1.5 italic">
                        <${Icon} name="Heart" size=${12} className="text-[#ffb8c6]" />
                        ${item.title}
                    </h3>
                    <div className="flex gap-2">
                        <button
                            onClick=${() => onCopy(item.content, "定型文をコピーしました")}
                            className="p-2.5 bg-[#fff5f7] text-[#ff8da1] rounded-xl active:scale-90"
                        >
                            <${Icon} name="Clipboard" size=${16} />
                        </button>
                        <button onClick=${() => onEdit(item)} className="p-2.5 text-gray-300 active:scale-90">
                            <${Icon} name="Edit2" size=${16} />
                        </button>
                        <button onClick=${() => onDelete(item.id)} className="p-2.5 text-gray-200 active:scale-90 active:text-red-400">
                            <${Icon} name="Trash2" size=${16} />
                        </button>
                    </div>
                </div>
                <div className="text-[11px] font-medium text-gray-500 leading-relaxed bg-[#fafafa] p-4 rounded-xl border border-dashed border-[#ffdce5] whitespace-pre-wrap">
                    ${item.content}
                </div>
            </div>
        `);

        // ────────────────────────────────────────────
        // 取引モーダルフォーム
        // ────────────────────────────────────────────
        const ExchangeForm = ({ formData, onChange, onSave, errors = {} }) => html`
            <div className="space-y-5 pb-6">
                <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1.5">
                        <p className="text-[8px] font-black text-gray-400 ml-1 uppercase">Name</p>
                        <input
                            type="text" placeholder="名前"
                            className=${`w-full bg-[#fafafa] rounded-2xl p-4 text-[14px] font-bold border-2 outline-none transition-all ${
                                errors.accountName ? "border-red-400 bg-red-50" : "border-transparent focus:border-black"
                            }`}
                            value=${formData.accountName}
                            onChange=${(e) => onChange({ accountName: e.target.value })}
                        />
                        ${errors.accountName && html`<p className="text-[9px] text-red-400 font-bold ml-1">${errors.accountName}</p>`}
                    </div>
                    <div className="space-y-1.5">
                        <p className="text-[8px] font-black text-gray-400 ml-1 uppercase">Twitter ID</p>
                        <input
                            type="text" placeholder="@抜き"
                            className="w-full bg-[#fafafa] rounded-2xl p-4 text-[14px] font-bold border-2 border-transparent focus:border-black outline-none transition-all"
                            value=${formData.twitterId}
                            onChange=${(e) => onChange({ twitterId: e.target.value })}
                        />
                    </div>
                </div>
                <div className="space-y-1.5">
                    <p className="text-[8px] font-black text-gray-400 ml-1 uppercase">Full Name (Real)</p>
                    <input
                        type="text" placeholder="発送先氏名"
                        className="w-full bg-[#fafafa] rounded-2xl p-4 text-[14px] font-bold border-2 border-transparent focus:border-black outline-none transition-all"
                        value=${formData.realName}
                        onChange=${(e) => onChange({ realName: e.target.value })}
                    />
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1.5">
                        <p className="text-[8px] font-black text-[#ff8da1] ml-1 uppercase">Receiving (Get)</p>
                        <input
                            type="text"
                            className="w-full bg-[#fffcfd] border-2 border-[#ffdce5] rounded-2xl p-4 text-[14px] font-bold outline-none"
                            value=${formData.receivingItem}
                            onChange=${(e) => onChange({ receivingItem: e.target.value })}
                        />
                    </div>
                    <div className="space-y-1.5">
                        <p className="text-[8px] font-black text-gray-400 ml-1 uppercase">Giving (Give)</p>
                        <input
                            type="text"
                            className="w-full bg-[#fafafa] rounded-2xl p-4 text-[14px] font-bold border-2 border-transparent focus:border-black outline-none transition-all"
                            value=${formData.givingItem}
                            onChange=${(e) => onChange({ givingItem: e.target.value })}
                        />
                    </div>
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1.5">
                        <p className="text-[8px] font-black text-black ml-1 uppercase">My Status</p>
                        <select
                            className="w-full bg-[#fafafa] rounded-2xl p-4 text-[14px] font-black appearance-none border-2 border-transparent outline-none focus:border-black transition-all"
                            value=${formData.myStatus}
                            onChange=${(e) => onChange({ myStatus: e.target.value })}
                        >
                            ${STATUS_OPTIONS.map((s) => html`<option key=${s}>${s}</option>`)}
                        </select>
                    </div>
                    <div className="space-y-1.5">
                        <p className="text-[8px] font-black text-black ml-1 uppercase">Partner Status</p>
                        <select
                            className="w-full bg-[#fafafa] rounded-2xl p-4 text-[14px] font-black appearance-none border-2 border-transparent outline-none focus:border-black transition-all"
                            value=${formData.partnerStatus}
                            onChange=${(e) => onChange({ partnerStatus: e.target.value })}
                        >
                            ${STATUS_OPTIONS.map((s) => html`<option key=${s}>${s}</option>`)}
                        </select>
                    </div>
                </div>
                <div className="space-y-1.5">
                    <p className="text-[8px] font-black text-gray-400 ml-1 uppercase">Notes / Memo</p>
                    <textarea
                        className="w-full bg-[#fafafa] rounded-2xl p-4 text-[13px] font-medium border-2 border-transparent outline-none focus:border-black transition-all"
                        rows="2" placeholder="予定など..."
                        value=${formData.notes}
                        onChange=${(e) => onChange({ notes: e.target.value })}
                    />
                </div>
                <div className="flex flex-wrap gap-2 py-2">
                    ${[
                        { id: "ongoing", label: "進行中" },
                        { id: "dm",      label: "ＤＭ済" },
                        { id: "waiting", label: "待ち"   },
                        { id: "completed", label: "完了" },
                    ].map((cat) => html`
                        <button
                            key=${cat.id}
                            onClick=${() => onChange({ category: cat.id })}
                            className=${`px-5 py-2.5 rounded-xl text-[10px] font-black border-2 transition-all ${
                                formData.category === cat.id
                                    ? "bg-black text-white border-black shadow-md"
                                    : "bg-white text-gray-300 border-gray-100"
                            }`}
                        >
                            ${cat.label}
                        </button>
                    `)}
                </div>
                <button
                    onClick=${onSave}
                    className="w-full bg-black text-white font-black py-5 rounded-[1.5rem] text-[15px] active:scale-95 transition-transform shadow-xl shadow-black/20"
                >
                    データを保存
                </button>
            </div>
        `;

        // ────────────────────────────────────────────
        // 定型文モーダルフォーム
        // ────────────────────────────────────────────
        const TemplateForm = ({ templateData, onChange, onSave, errors = {} }) => html`
            <div className="space-y-5 pb-6">
                <div className="space-y-1.5">
                    <p className="text-[8px] font-black text-gray-400 ml-1 uppercase">Template Title</p>
                    <input
                        placeholder="タイトル"
                        className=${`w-full bg-[#fafafa] rounded-2xl p-4 text-[14px] font-black outline-none border-2 transition-all ${
                            errors.title ? "border-red-400 bg-red-50" : "border-transparent focus:border-black"
                        }`}
                        value=${templateData.title}
                        onChange=${(e) => onChange({ title: e.target.value })}
                    />
                    ${errors.title && html`<p className="text-[9px] text-red-400 font-bold ml-1">${errors.title}</p>`}
                </div>
                <div className="space-y-1.5">
                    <p className="text-[8px] font-black text-gray-400 ml-1 uppercase">Body Content</p>
                    <textarea
                        placeholder="定型文を入力..." rows="8"
                        className="w-full bg-[#fafafa] rounded-2xl p-4 text-[13px] font-medium outline-none border-2 border-transparent focus:border-black transition-all"
                        value=${templateData.content}
                        onChange=${(e) => onChange({ content: e.target.value })}
                    />
                </div>
                <button
                    onClick=${onSave}
                    className="w-full bg-black text-white font-black py-5 rounded-[1.5rem] text-[15px] active:scale-95 transition-transform shadow-xl shadow-black/20"
                >
                    定型文を保存
                </button>
            </div>
        `;

        // ────────────────────────────────────────────
        // モーダル
        // ────────────────────────────────────────────
        const Modal = ({ modalType, formData, onFormChange, templateData, onTemplateChange, onSave, onClose, errors }) => {
            // Escキーで閉じる
            useEffect(() => {
                const handler = (e) => { if (e.key === "Escape") onClose(); };
                document.addEventListener("keydown", handler);
                return () => document.removeEventListener("keydown", handler);
            }, [onClose]);

            return html`
            <div
                className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col justify-end transition-all"
                onMouseDown=${onClose}
            >
                <div
                    className="bg-white w-full rounded-t-[2.5rem] p-8 pb-12 shadow-2xl overflow-y-auto max-h-[90vh] modal-up"
                    onMouseDown=${(e) => e.stopPropagation()}
                >
                    <header className="flex justify-between items-center mb-8 sticky top-0 bg-white z-10">
                        <div className="w-12 h-1.5 bg-gray-100 rounded-full absolute -top-4 left-1/2 -translate-x-1/2" />
                        <h2 className="text-sm font-black italic tracking-widest border-l-4 border-[#ffb8c6] pl-3 uppercase">
                            ${modalType === "exchange" ? "Trade Data" : "Text Template"}
                        </h2>
                        <button
                            onClick=${onClose}
                            className="text-[10px] font-black bg-gray-50 px-4 py-2 rounded-full text-gray-400 active:text-black transition-colors uppercase"
                        >
                            Cancel
                        </button>
                    </header>

                    ${modalType === "exchange"
                        ? html`<${ExchangeForm} formData=${formData} onChange=${onFormChange} onSave=${onSave} errors=${errors} />`
                        : html`<${TemplateForm} templateData=${templateData} onChange=${onTemplateChange} onSave=${onSave} errors=${errors} />`
                    }
                </div>
            </div>
            `;
        };

        // ────────────────────────────────────────────
        // メインアプリ
        // ────────────────────────────────────────────
        const App = () => {
            const [activeTab, setActiveTab] = useState("ongoing");
            const [exchanges, setExchanges] = useLocalStorage("exchanges", []);
            const [templates, setTemplates] = useLocalStorage("templates", []);
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState("exchange");
            const [editingItem, setEditingItem] = useState(null);
            const [formData, setFormData] = useState({ ...EMPTY_EXCHANGE });
            const [templateData, setTemplateData] = useState({ ...EMPTY_TEMPLATE });
            const [errors, setErrors] = useState({});

            const { toast, showToast } = useToast();
            const { confirm, ConfirmUI } = useConfirm();

            // モーダル表示中はbodyスクロールを無効化
            useEffect(() => {
                document.body.style.overflow = showModal ? "hidden" : "";
                return () => { document.body.style.overflow = ""; };
            }, [showModal]);

            const stats = useMemo(() => ({
                ongoing:   exchanges.filter((e) => e.category === "ongoing").length,
                dm:        exchanges.filter((e) => e.category === "dm").length,
                waiting:   exchanges.filter((e) => e.category === "waiting").length,
                completed: exchanges.filter((e) => e.category === "completed").length,
            }), [exchanges]);

            const openAddModal = useCallback(() => {
                setEditingItem(null);
                setErrors({});
                const type = activeTab === "templates" ? "template" : "exchange";
                setModalType(type);
                setFormData({ ...EMPTY_EXCHANGE, category: activeTab === "templates" ? "ongoing" : activeTab });
                setTemplateData({ ...EMPTY_TEMPLATE });
                setShowModal(true);
            }, [activeTab]);

            const openEditExchange = useCallback((item) => {
                setEditingItem(item);
                setErrors({});
                setFormData({ ...item });
                setModalType("exchange");
                setShowModal(true);
            }, []);

            const openEditTemplate = useCallback((item) => {
                setEditingItem(item);
                setErrors({});
                setTemplateData({ ...item });
                setModalType("template");
                setShowModal(true);
            }, []);

            const closeModal = useCallback(() => {
                setShowModal(false);
                setEditingItem(null);
                setErrors({});
            }, []);

            const validate = useCallback(() => {
                const errs = {};
                if (modalType === "exchange") {
                    if (!formData.accountName.trim()) errs.accountName = "名前を入力してください";
                } else {
                    if (!templateData.title.trim()) errs.title = "タイトルを入力してください";
                }
                setErrors(errs);
                return Object.keys(errs).length === 0;
            }, [modalType, formData, templateData]);

            const handleSave = useCallback(() => {
                if (!validate()) return;
                if (modalType === "exchange") {
                    if (editingItem) {
                        setExchanges((prev) => prev.map((e) => e.id === editingItem.id ? { ...formData, id: e.id } : e));
                    } else {
                        setExchanges((prev) => [...prev, { ...formData, id: Date.now() }]);
                    }
                    showToast("取引データを保存しました");
                } else {
                    if (editingItem) {
                        setTemplates((prev) => prev.map((t) => t.id === editingItem.id ? { ...templateData, id: t.id } : t));
                    } else {
                        setTemplates((prev) => [...prev, { ...templateData, id: Date.now() }]);
                    }
                    showToast("定型文を保存しました");
                }
                closeModal();
            }, [modalType, editingItem, formData, templateData, validate, closeModal, showToast]);

            const deleteExchange = useCallback(async (id) => {
                const ok = await confirm("この取引データを削除しますか？\nこの操作は元に戻せません。");
                if (!ok) return;
                setExchanges((prev) => prev.filter((e) => e.id !== id));
                showToast("削除しました");
            }, [confirm, showToast]);

            const deleteTemplate = useCallback(async (id) => {
                const ok = await confirm("この定型文を削除しますか？\nこの操作は元に戻せません。");
                if (!ok) return;
                setTemplates((prev) => prev.filter((t) => t.id !== id));
                showToast("削除しました");
            }, [confirm, showToast]);

            const handleFormChange = useCallback((patch) => {
                setFormData((prev) => ({ ...prev, ...patch }));
                // 入力時にエラーをクリア
                const keys = Object.keys(patch);
                if (keys.some((k) => errors[k])) {
                    setErrors((prev) => { const next = { ...prev }; keys.forEach((k) => delete next[k]); return next; });
                }
            }, [errors]);

            const handleTemplateChange = useCallback((patch) => {
                setTemplateData((prev) => ({ ...prev, ...patch }));
                const keys = Object.keys(patch);
                if (keys.some((k) => errors[k])) {
                    setErrors((prev) => { const next = { ...prev }; keys.forEach((k) => delete next[k]); return next; });
                }
            }, [errors]);

            const handleCopy = useCallback(async (text, label = "コピーしました") => {
                await copyToClipboard(text);
                showToast(label);
            }, [showToast]);

            const visibleExchanges = exchanges.filter((e) => e.category === activeTab);

            return html`
                <div className="min-h-screen flex flex-col pb-20 overflow-x-hidden">
                    <header className="bg-white/90 backdrop-blur-xl border-b border-gray-100 safe-top sticky top-0 z-30">
                        <div className="max-w-md mx-auto px-5 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-1.5 h-4 bg-black rounded-full" />
                                <h1 className="text-sm font-black italic tracking-tighter">取引管理</h1>
                            </div>
                            <button
                                onClick=${openAddModal}
                                className="bg-black text-white w-9 h-9 rounded-full flex items-center justify-center active:scale-90 transition-transform shadow-lg shadow-black/10"
                            >
                                <${Icon} name="Plus" size=${20} />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto w-full p-4 space-y-4">
                        <${SummarySection} stats=${stats} />
                        <${TabNav} activeTab=${activeTab} onTabChange=${setActiveTab} />

                        <div className="space-y-4">
                            ${activeTab === "templates"
                                ? templates.length === 0
                                    ? html`<p className="text-center py-10 text-gray-300 text-[10px] font-bold italic">データがありません</p>`
                                    : templates.map((item) => html`<${TemplateCard} key=${item.id} item=${item} onEdit=${openEditTemplate} onDelete=${deleteTemplate} onCopy=${handleCopy} />`)
                                : visibleExchanges.length === 0
                                    ? html`<p className="text-center py-10 text-gray-300 text-[10px] font-bold italic">データがありません</p>`
                                    : visibleExchanges.map((item) => html`<${ExchangeCard} key=${item.id} item=${item} onEdit=${openEditExchange} onDelete=${deleteExchange} onCopy=${handleCopy} />`)
                            }
                        </div>
                    </main>

                    ${showModal && html`
                        <${Modal}
                            modalType=${modalType}
                            formData=${formData}
                            onFormChange=${handleFormChange}
                            templateData=${templateData}
                            onTemplateChange=${handleTemplateChange}
                            onSave=${handleSave}
                            onClose=${closeModal}
                            errors=${errors}
                        />
                    `}

                    ${ConfirmUI}
                    <${Toast} message=${toast.message} visible=${toast.visible} />
                </div>
            `;
        };

        const container = document.getElementById("root");
        const root = ReactDOM.createRoot(container);
        root.render(html`<${App} />`);
    </script>
</body>
</html>
