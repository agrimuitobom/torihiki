<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="r1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2222"/>
      <stop offset="100%" stop-color="#ff5544"/>
    </linearGradient>
    <linearGradient id="r2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff2222"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="96" cy="96" r="56" fill="#ff2222" opacity="0.06"/>
  <!-- Top arrow → -->
  <line x1="52" y1="76" x2="128" y2="76" stroke="url(#r1)" stroke-width="7" stroke-linecap="round"/>
  <polyline points="116,62 132,76 116,90" fill="none" stroke="#ff4444" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom arrow ← -->
  <line x1="140" y1="116" x2="64" y2="116" stroke="url(#r2)" stroke-width="7" stroke-linecap="round"/>
  <polyline points="76,102 60,116 76,130" fill="none" stroke="#cc0000" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="96" cy="96" r="4" fill="#ff3333" opacity="0.8"/>
</svg>
