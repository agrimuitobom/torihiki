<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb8c6"/>
      <stop offset="100%" stop-color="#ff8da1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative corner accents -->
  <circle cx="426" cy="86" r="74" fill="#ff8da1" opacity="0.12"/>
  <circle cx="86" cy="426" r="54" fill="#ffb8c6" opacity="0.08"/>
  <!-- Exchange arrows -->
  <g transform="translate(256,145)">
    <!-- Right arrow -->
    <line x1="-75" y1="0" x2="75" y2="0" stroke="url(#pink)" stroke-width="13" stroke-linecap="round"/>
    <polyline points="50,-26 75,0 50,26" fill="none" stroke="#ff8da1" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left arrow -->
    <line x1="75" y1="48" x2="-75" y2="48" stroke="url(#pink)" stroke-width="13" stroke-linecap="round"/>
    <polyline points="-50,22 -75,48 -50,74" fill="none" stroke="#ffb8c6" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Main text -->
  <text x="256" y="315" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-weight="900" font-size="138" letter-spacing="-5">取引</text>
  <!-- Subtle bottom line accent -->
  <rect x="160" y="373" width="192" height="8" rx="4" fill="url(#pink)" opacity="0.6"/>
  <!-- Small dot accents -->
  <circle cx="134" cy="377" r="6.5" fill="#ffb8c6" opacity="0.5"/>
  <circle cx="378" cy="377" r="6.5" fill="#ff8da1" opacity="0.5"/>
</svg>
